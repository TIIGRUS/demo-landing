<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Нет подключения</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                font-family: Arial, sans-serif;
                background: #2a2c2f;
                color: #ffffff;
            }

            main {
                max-width: 420px;
                text-align: center;
            }

            h1 {
                margin: 0 0 16px;
                font-size: 32px;
                line-height: 1.2;
            }

            p {
                margin: 0 0 24px;
                font-size: 16px;
                line-height: 1.5;
                color: rgba(255, 255, 255, 0.8);
            }

            a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 12px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                text-decoration: none;
                background-color: #ffffff;
                color: #2a2c2f;

                font-size: 14px;
                font-weight: 500;
                line-height: 1;
                transition: all 0.2s ease;
                outline: 2px solid transparent;
                outline-offset: 2px;
            }

            a:hover {
                opacity: 0.9;
            }
            a:active {
                transform: scale(0.98);
                opacity: 0.85;
            }

            a:focus {
                outline: 2px solid rgb(255 255 255 / 80%);
            }

            a:focus:not(:focus-visible) {
                outline: none;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Нет подключения к интернету</h1>
            <p>Страница недоступна без сети. Проверь подключение и попробуй загрузить её снова.</p>
            <a href="/">Попробовать снова</a>
        </main>
    </body>
</html>
